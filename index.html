<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b0b0d">
    <title>CinePass PWA</title>
    <link rel="manifest" href="data:application/manifest+json,{'name':'CinePass','short_name':'CinePass','start_url':'.','display':'standalone','background_color':'#0b0b0d','theme_color':'#0b0b0d' }">
    
    <style>
        :root {
            --bg: #0b0b0d;
            --card-bg: #1c1c1e;
            --accent: #ff3b30;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --radius: 22px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 500px;
            padding: 40px 25px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #add-btn {
            background: var(--text-main);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 28px;
            cursor: pointer;
        }

        #ticket-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            perspective: 1500px;
        }

        /* Tarjeta */
        .ticket-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            transform-style: preserve-3d;
            transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        .ticket-wrapper.is-flipped { transform: rotateY(180deg); }

        .ticket-front, .ticket-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .ticket-front img { width: 100%; height: 100%; object-fit: cover; }
        
        .overlay-text {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            font-weight: 700;
            font-size: 1.3rem;
        }

        .ticket-back {
            background: white;
            color: #1c1c1e;
            transform: rotateY(180deg);
            display: flex;
            padding: 20px;
            align-items: center;
            gap: 15px;
        }

        .qr-img { width: 110px; height: 110px; object-fit: contain; border-radius: 8px; border: 1px solid #eee; }

        .info-grid { display: flex; flex-direction: column; gap: 4px; }
        .info-grid h3 { margin: 0; font-size: 1.1rem; }
        .info-grid span { font-size: 0.7rem; text-transform: uppercase; color: var(--accent); font-weight: 800; }
        .info-grid p { margin: 0; font-size: 0.85rem; color: #444; font-weight: 500; }

        .delete-btn {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(255,59,48,0.8);
            border: none; color: white;
            border-radius: 50%; width: 25px; height: 25px;
            z-index: 10; cursor: pointer;
        }

        /* Modal */
        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: flex-end;
            z-index: 100;
        }

        .modal-content {
            background: #1c1c1e;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 30px 30px 0 0;
            padding: 25px;
            max-height: 90vh;
            overflow-y: auto;
        }

        input {
            width: 100%;
            background: #2c2c2e;
            border: none;
            padding: 14px;
            border-radius: 12px;
            color: white;
            margin-bottom: 12px;
        }

        label { display: block; margin: 10px 0 5px; font-size: 0.8rem; color: var(--text-dim); }

        .primary-btn {
            width: 100%; padding: 16px;
            background: white; color: black;
            border: none; border-radius: 14px;
            font-weight: bold; margin-top: 15px;
        }

        .hidden { display: none !important; }
        #empty-state { margin-top: 100px; text-align: center; color: var(--text-dim); }
    </style>
</head>
<body>

    <header>
        <h1>Mis Entradas</h1>
        <button id="add-btn" onclick="openModal()">+</button>
    </header>

    <main id="app">
        <div id="empty-state">
            <p>🎟️ No hay entradas guardadas</p>
        </div>
        <div id="ticket-container"></div>
    </main>

    <div id="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h2 style="margin:0">Añadir Ticket</h2>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:20px;">✕</button>
            </div>
            
            <input type="text" id="m-name" placeholder="Película">
            <input type="text" id="m-cine" placeholder="Cine">
            
            <div style="display:flex; gap:10px;">
                <input type="number" id="m-count" placeholder="Cant. Asientos">
                <input type="number" id="m-hall" placeholder="Sala">
            </div>
            <input type="text" id="m-seats" placeholder="Detalle (Ej: G12, G13)">

            <label>Imagen de Fondo (Poster)</label>
            <input type="file" id="m-img" accept="image/*">
            
            <label>Imagen del QR</label>
            <input type="file" id="m-qr" accept="image/*">
            
            <button class="primary-btn" onclick="processTicket()">Guardar Entrada</button>
        </div>
    </div>

    <script>
        // --- LÓGICA DE PERSISTENCIA Y FUNCIONAMIENTO ---
        let tickets = JSON.parse(localStorage.getItem('my_tickets')) || [];

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // Convertir imagen a Base64 para guardar en LocalStorage
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        async function processTicket() {
            const name = document.getElementById('m-name').value;
            if (!name) return alert("Nombre requerido");

            const imgFile = document.getElementById('m-img').files[0];
            const qrFile = document.getElementById('m-qr').files[0];

            const newTicket = {
                id: Date.now(),
                name: name,
                cine: document.getElementById('m-cine').value || 'Cine Local',
                count: document.getElementById('m-count').value || '1',
                hall: document.getElementById('m-hall').value || '-',
                seats: document.getElementById('m-seats').value || '-',
                poster: imgFile ? await toBase64(imgFile) : null,
                qr: qrFile ? await toBase64(qrFile) : null
            };

            tickets.push(newTicket);
            saveAndRefresh();
            closeModal();
            // Limpiar formulario
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        function saveAndRefresh() {
            localStorage.setItem('my_tickets', JSON.stringify(tickets));
            renderTickets();
        }

        function deleteTicket(id, e) {
            e.stopPropagation();
            if(confirm("¿Eliminar esta entrada?")) {
                tickets = tickets.filter(t => t.id !== id);
                saveAndRefresh();
            }
        }

        function renderTickets() {
            const container = document.getElementById('ticket-container');
            const empty = document.getElementById('empty-state');
            container.innerHTML = '';

            if (tickets.length === 0) {
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                tickets.forEach(t => {
                    const el = document.createElement('div');
                    el.className = 'ticket-wrapper';
                    el.onclick = () => el.classList.toggle('is-flipped');

                    el.innerHTML = `
                        <button class="delete-btn" onclick="deleteTicket(${t.id}, event)">×</button>
                        <div class="ticket-front">
                            ${t.poster ? `<img src="${t.poster}">` : `<div style="width:100%;height:100%;background:#2c2c2e"></div>`}
                            <div class="overlay-text">${t.name}</div>
                        </div>
                        <div class="ticket-back">
                            <img src="${t.qr || 'https://via.placeholder.com/150?text=QR'}" class="qr-img">
                            <div class="info-grid">
                                <span>Ticket Confirmado</span>
                                <h3>${t.name}</h3>
                                <p>📍 ${t.cine}</p>
                                <p>Sala ${t.hall} • ${t.count} personas</p>
                                <p style="color:var(--accent)">Butacas: ${t.seats}</p>
                            </div>
                        </div>
                    `;
                    container.appendChild(el);
                });
            }
        }

        // Registrar Service Worker simple para PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('data:text/javascript;base64,' + btoa('self.addEventListener("fetch", (event) => {});'));
            });
        }

        // Carga inicial
        renderTickets();
    </script>
</body>
</html>
