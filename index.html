<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>CinePass Pro</title>
    <link rel="manifest" href="data:application/manifest+json,{'name':'CinePass','short_name':'CinePass','start_url':'.','display':'standalone','background_color':'#000000','theme_color':'#000000' }">
    
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --accent: #ff3b30;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --radius: 24px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }

        body { background-color: var(--bg); color: var(--text-main); margin: 0; overflow-x: hidden; }

        /* --- Pantalla Principal --- */
        header {
            width: 100%; max-width: 500px; margin: 0 auto;
            padding: 50px 25px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        h1 { font-size: 2.2rem; margin: 0; font-weight: 800; letter-spacing: -1px; }
        #add-btn {
            background: white; border: none; width: 44px; height: 44px;
            border-radius: 50%; font-size: 28px; cursor: pointer;
        }

        #ticket-container {
            width: 100%; max-width: 500px; margin: 0 auto; padding: 15px;
            display: grid; grid-template-columns: 1fr; gap: 20px;
        }

        .home-card {
            position: relative; width: 100%; aspect-ratio: 16/9;
            border-radius: var(--radius); overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer;
            transition: transform 0.2s;
        }
        .home-card:active { transform: scale(0.96); }
        .home-card img { width: 100%; height: 100%; object-fit: cover; }
        .home-card .label {
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            font-size: 1.4rem; font-weight: 700;
        }

        /* --- Vista de Detalle (Pantalla Completa) --- */
        #detail-view {
            position: fixed; inset: 0; background: var(--bg); z-index: 50;
            display: none; flex-direction: column; overflow-y: auto;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .detail-poster {
            width: 100%; aspect-ratio: 1/1.2; position: relative;
        }
        .detail-poster img { width: 100%; height: 100%; object-fit: cover; }
        .detail-poster .gradient {
            position: absolute; inset: 0;
            background: linear-gradient(to bottom, transparent 60%, var(--bg) 98%);
        }
        .close-detail {
            position: absolute; top: 50px; left: 20px;
            background: rgba(0,0,0,0.5); border: none; color: white;
            width: 40px; height: 40px; border-radius: 50%; font-size: 20px; z-index: 10;
        }

        .detail-content { padding: 0 25px 50px; margin-top: -60px; position: relative; z-index: 5; }
        .detail-title { font-size: 2.5rem; font-weight: 900; margin: 0 0 25px; line-height: 1; }
        
        .info-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 30px; }
        .info-pill {
            background: var(--card-bg); padding: 12px 18px; border-radius: 16px;
            display: flex; align-items: center; gap: 10px; font-weight: 600;
        }
        .info-pill span { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; display: block; }

        .detail-actions { display: flex; gap: 10px; margin-bottom: 30px; }
        .action-btn {
            flex: 1; padding: 15px; border-radius: 14px; border: none;
            font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-edit { background: #2c2c2e; color: white; }
        .btn-delete { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }

        .qr-section {
            background: white; padding: 30px; border-radius: var(--radius);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            cursor: pointer; margin-top: 10px;
        }
        .qr-section img { width: 180px; height: 180px; }
        .qr-section p { color: #000; margin: 0; font-weight: 800; font-size: 0.8rem; letter-spacing: 1px; }

        /* --- Modales (Wizard y QR Full) --- */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px);
            display: none; align-items: flex-end; z-index: 100;
        }
        .modal-content {
            background: var(--card-bg); width: 100%; max-width: 500px; margin: 0 auto;
            border-radius: 30px 30px 0 0; padding: 30px;
        }

        /* Wizard Steps */
        .step-container { display: none; flex-direction: column; gap: 15px; }
        .step-container.active { display: flex; }
        input {
            width: 100%; background: #2c2c2e; border: none; padding: 18px;
            border-radius: 14px; color: white; font-size: 1rem;
        }
        .file-box {
            border: 2px dashed #444; padding: 30px; border-radius: 14px; text-align: center; cursor: pointer;
        }

        #qr-full-modal {
            position: fixed; inset: 0; background: white; z-index: 200;
            display: none; align-items: center; justify-content: center;
        }
        #qr-full-modal img { width: 90vw; max-width: 400px; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <h1>CinePass</h1>
        <button id="add-btn" onclick="openWizard()">+</button>
    </header>

    <main id="ticket-container"></main>
    <div id="empty-state" style="text-align: center; margin-top: 100px; color: var(--text-dim);">
        <p>No tienes entradas aún</p>
    </div>

    <div id="detail-view">
        <button class="close-detail" onclick="closeDetail()">✕</button>
        <div class="detail-poster">
            <img id="det-img" src="" alt="">
            <div class="gradient"></div>
        </div>
        <div class="detail-content">
            <h2 id="det-title" class="detail-title"></h2>
            
            <div class="info-row">
                <div class="info-pill">
                    <div><span>📍 Cine</span><div id="det-cine"></div></div>
                </div>
                <div class="info-pill">
                    <div><span>🚪 Sala</span><div id="det-hall"></div></div>
                </div>
                <div class="info-pill">
                    <div><span>👥 Personas</span><div id="det-count"></div></div>
                </div>
                <div class="info-pill" style="width: 100%;">
                    <div><span>💺 Butacas</span><div id="det-seats"></div></div>
                </div>
            </div>

            <div class="detail-actions">
                <button class="action-btn btn-edit" onclick="editTicket()">✏️ Editar</button>
                <button class="action-btn btn-delete" onclick="handleDelete()">🗑️ Borrar</button>
            </div>

            <div class="qr-section" onclick="openFullQR()">
                <img id="det-qr" src="" alt="QR">
                <p>TOCA PARA AMPLIAR</p>
            </div>
        </div>
    </div>

    <div id="wizard-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="wiz-title" style="margin-top:0">Nueva Entrada</h3>
            
            <div id="step-1" class="step-container active">
                <input type="text" id="m-name" placeholder="Nombre de la película">
                <div class="file-box" onclick="document.getElementById('m-img').click()">
                    <span id="p-label">🖼️ Subir Póster</span>
                    <input type="file" id="m-img" hidden accept="image/*" onchange="labelFile(this, 'p-label')">
                </div>
                <button class="action-btn btn-edit" style="background:white; color:black; margin-top:10px" onclick="nextStep(2)">Siguiente</button>
            </div>

            <div id="step-2" class="step-container">
                <input type="text" id="m-cine" placeholder="Cine">
                <div style="display:flex; gap:10px">
                    <input type="number" id="m-count" placeholder="Pers.">
                    <input type="number" id="m-hall" placeholder="Sala">
                </div>
                <input type="text" id="m-seats" placeholder="Butacas">
                <button class="action-btn btn-edit" style="background:white; color:black; margin-top:10px" onclick="nextStep(3)">Siguiente</button>
            </div>

            <div id="step-3" class="step-container">
                <div class="file-box" onclick="document.getElementById('m-qr').click()">
                    <span id="q-label">🔳 Subir Código QR</span>
                    <input type="file" id="m-qr" hidden accept="image/*" onchange="labelFile(this, 'q-label')">
                </div>
                <button class="action-btn btn-edit" style="background:var(--accent); color:white; margin-top:10px" onclick="saveTicket()">Finalizar</button>
            </div>
            
            <button onclick="closeWizard()" style="background:none; border:none; color:var(--text-dim); width:100%; margin-top:15px">Cancelar</button>
        </div>
    </div>

    <div id="qr-full-modal" onclick="this.style.display='none'">
        <img id="qr-big" src="" alt="">
    </div>

    <script>
        let tickets = JSON.parse(localStorage.getItem('cinepass_v4')) || [];
        let currentTicketId = null;
        let step = 1;

        // --- Navegación ---
        function openWizard() { 
            step = 1; 
            currentTicketId = null;
            document.querySelectorAll('.step-container').forEach(s => s.classList.remove('active'));
            document.getElementById('step-1').classList.add('active');
            document.getElementById('wizard-modal').style.display = 'flex'; 
        }
        function closeWizard() { document.getElementById('wizard-overlay'); document.getElementById('wizard-modal').style.display='none'; }
        function nextStep(s) {
            document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
            document.getElementById('step-'+s).classList.add('active');
        }

        function labelFile(input, id) {
            if(input.files[0]) document.getElementById(id).innerText = "✅ Seleccionado";
        }

        // --- CRUD ---
        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = e => reject(e);
        });

        async function saveTicket() {
            const name = document.getElementById('m-name').value;
            if(!name) return alert("Falta nombre");

            const imgF = document.getElementById('m-img').files[0];
            const qrF = document.getElementById('m-qr').files[0];

            const obj = {
                id: currentTicketId || Date.now(),
                name,
                cine: document.getElementById('m-cine').value || 'Cine Local',
                count: document.getElementById('m-count').value || '1',
                hall: document.getElementById('m-hall').value || '-',
                seats: document.getElementById('m-seats').value || '-',
                poster: imgF ? await toBase64(imgF) : (currentTicketId ? tickets.find(t=>t.id==currentTicketId).poster : null),
                qr: qrF ? await toBase64(qrF) : (currentTicketId ? tickets.find(t=>t.id==currentTicketId).qr : null)
            };

            if(currentTicketId) {
                tickets = tickets.map(t => t.id === currentTicketId ? obj : t);
            } else {
                tickets.push(obj);
            }

            localStorage.setItem('cinepass_v4', JSON.stringify(tickets));
            render();
            closeWizard();
            if(currentTicketId) closeDetail();
        }

        function handleDelete() {
            if(confirm("¿Eliminar entrada?")) {
                tickets = tickets.filter(t => t.id !== currentTicketId);
                localStorage.setItem('cinepass_v4', JSON.stringify(tickets));
                render();
                closeDetail();
            }
        }

        // --- Renderizado y Vistas ---
        function render() {
            const container = document.getElementById('ticket-container');
            container.innerHTML = '';
            document.getElementById('empty-state').style.display = tickets.length ? 'none' : 'block';
            
            tickets.forEach(t => {
                const card = document.createElement('div');
                card.className = 'home-card';
                card.onclick = () => openDetail(t.id);
                card.innerHTML = `
                    <img src="${t.poster || 'https://via.placeholder.com/500x280?text=CinePass'}" alt="">
                    <div class="label">${t.name}</div>
                `;
                container.appendChild(card);
            });
        }

        function openDetail(id) {
            const t = tickets.find(x => x.id === id);
            currentTicketId = id;
            document.getElementById('det-title').innerText = t.name;
            document.getElementById('det-img').src = t.poster || '';
            document.getElementById('det-cine').innerText = t.cine;
            document.getElementById('det-hall').innerText = t.hall;
            document.getElementById('det-count').innerText = t.count;
            document.getElementById('det-seats').innerText = t.seats;
            document.getElementById('det-qr').src = t.qr || '';
            document.getElementById('detail-view').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() {
            document.getElementById('detail-view').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function openFullQR() {
            document.getElementById('qr-big').src = document.getElementById('det-qr').src;
            document.getElementById('qr-full-modal').style.display = 'flex';
        }

        function editTicket() {
            const t = tickets.find(x => x.id === currentTicketId);
            document.getElementById('m-name').value = t.name;
            document.getElementById('m-cine').value = t.cine;
            document.getElementById('m-count').value = t.count;
            document.getElementById('m-hall').value = t.hall;
            document.getElementById('m-seats').value = t.seats;
            document.getElementById('wiz-title').innerText = "Editar Entrada";
            openWizard();
        }

        render();
    </script>
</body>
</html>
