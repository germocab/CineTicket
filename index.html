<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Tickets</title>
 <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
    <link rel="manifest" href="favicon_io/site.webmanifest">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #1c1c1e;
            --accent: #ff3b30;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --radius: 24px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); margin: 0; overflow-x: hidden; }

        header { width: 100%; max-width: 500px; margin: 0 auto; padding: 50px 25px 20px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 2.2rem; margin: 0; font-weight: 800; letter-spacing: -1px; }
        
        #add-btn { background: white; border: none; width: 44px; height: 44px; border-radius: 50%; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
        #add-btn:active { transform: scale(0.9); }

        #ticket-container { width: 100%; max-width: 500px; margin: 0 auto; padding: 15px; display: grid; gap: 20px; }

        /* ANIMACIÓN DE LA TARJETA EN HOME */
        .home-card { 
            position: relative; width: 100%; aspect-ratio: 16/9; 
            border-radius: var(--radius); overflow: hidden; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .home-card:active { transform: scale(0.95); }
        .home-card img { width: 100%; height: 100%; object-fit: cover; }
        .home-card .label { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); font-size: 1.4rem; font-weight: 700; }

        /* VISTA DETALLE CON ANIMACIÓN */
        #detail-view { 
            position: fixed; inset: 0; background: var(--bg); z-index: 100; 
            display: none; flex-direction: column; overflow-y: auto;
            opacity: 0; transform: scale(0.9);
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        #detail-view.active { display: flex; opacity: 1; transform: scale(1); }

        .detail-poster { width: 100%; aspect-ratio: 1/1.2; position: relative; }
        .detail-poster img { width: 100%; height: 100%; object-fit: cover; }
        .detail-poster .gradient { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, var(--bg) 95%); }
        
        .close-detail { 
            position: fixed; top: 40px; left: 20px; background: rgba(0,0,0,0.5); border: none; 
            color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; z-index: 110; cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .detail-content { padding: 0 25px 50px; margin-top: -60px; position: relative; z-index: 5; }
        .detail-title { font-size: 2.5rem; font-weight: 900; margin: 0 0 20px; line-height: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        
        .info-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 25px; }
        .info-pill { background: var(--card-bg); padding: 12px 18px; border-radius: 16px; flex: 1; min-width: 140px; }
        .info-pill span { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; display: block; margin-bottom: 4px; }
        .info-pill div { font-weight: 700; font-size: 1rem; }

        .detail-actions { display: flex; gap: 10px; margin-bottom: 30px; }
        .action-btn { flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; font-size: 0.9rem; transition: background 0.2s; }
        .btn-edit { background: #2c2c2e; color: white; }
        .btn-delete { background: rgba(255, 59, 48, 0.15); color: #ff3b30; }

        .qr-section { background: white; padding: 25px; border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; }
        .qr-section img { width: 180px; height: 180px; object-fit: contain; }
        .qr-section p { color: #000; margin: 0; font-weight: 800; font-size: 0.7rem; letter-spacing: 1px; }

        /* WIZARD MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; align-items: flex-end; z-index: 200; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 500px; margin: 0 auto; border-radius: 30px 30px 0 0; padding: 30px; }
        .step-container { display: none; flex-direction: column; gap: 15px; }
        .step-container.active { display: flex; }
        
        input { width: 100%; background: #2c2c2e; border: 1px solid #333; padding: 18px; border-radius: 14px; color: white; font-size: 1rem; }
        .file-box { border: 2px dashed #444; padding: 30px; border-radius: 14px; text-align: center; cursor: pointer; }
        
        #qr-full-modal { position: fixed; inset: 0; background: white; z-index: 300; display: none; align-items: center; justify-content: center; }
        #qr-full-modal img { width: 90vw; max-width: 400px; }
    </style>
</head>
<body>

    <header>
        <h1>Mis Entradas</h1>
        <button id="add-btn" onclick="openWizard()">+</button>
    </header>

    <main id="ticket-container"></main>
    <div id="empty-state" style="text-align: center; margin-top: 100px; color: var(--text-dim); display: none;">
        <p>No tienes entradas aún</p>
    </div>

    <div id="detail-view">
        <button class="close-detail" onclick="closeDetail()">✕</button>
        <div class="detail-poster">
            <img id="det-img" src="">
            <div class="gradient"></div>
        </div>
        <div class="detail-content">
            <h2 id="det-title" class="detail-title"></h2>
            <div class="info-row">
                <div class="info-pill"><span>Cine</span><div id="det-cine"></div></div>
                <div class="info-pill"><span>Sala</span><div id="det-hall"></div></div>
                <div class="info-pill"><span>Personas</span><div id="det-count"></div></div>
                <div class="info-pill" style="width: 100%;"><span>Butacas</span><div id="det-seats"></div></div>
            </div>
            <div class="detail-actions">
                <button class="action-btn btn-edit" onclick="editTicket()">Editar</button>
                <button class="action-btn btn-delete" onclick="handleDelete()">Borrar</button>
            </div>
            <div class="qr-section" onclick="openFullQR()">
                <img id="det-qr" src="">
                <p>TOCA PARA AMPLIAR</p>
            </div>
        </div>
    </div>

    <div id="wizard-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="wiz-title" style="margin-top:0">Nueva Entrada</h3>
            <div id="step-1" class="step-container active">
                <input type="text" id="m-name" placeholder="Nombre de la película">
                <div class="file-box" onclick="document.getElementById('m-img').click()">
                    <span id="p-label">Subir Póster</span>
                    <input type="file" id="m-img" hidden accept="image/*" onchange="labelFile(this, 'p-label')">
                </div>
                <button class="action-btn" style="background:white; color:black; margin-top:10px" onclick="nextStep(2)">Siguiente</button>
            </div>
            <div id="step-2" class="step-container">
                <input type="text" id="m-cine" placeholder="Cine">
                <div style="display:flex; gap:10px">
                    <input type="number" id="m-count" placeholder="Pers.">
                    <input type="number" id="m-hall" placeholder="Sala">
                </div>
                <input type="text" id="m-seats" placeholder="Butacas">
                <button class="action-btn" style="background:white; color:black; margin-top:10px" onclick="nextStep(3)">Siguiente</button>
            </div>
            <div id="step-3" class="step-container">
                <div class="file-box" onclick="document.getElementById('m-qr').click()">
                    <span id="q-label">Subir Código QR</span>
                    <input type="file" id="m-qr" hidden accept="image/*" onchange="labelFile(this, 'q-label')">
                </div>
                <button class="action-btn" style="background:var(--accent); color:white; margin-top:10px" id="final-btn" onclick="saveTicket()">Finalizar</button>
            </div>
            <button onclick="closeWizard()" style="background:none; border:none; color:var(--text-dim); width:100%; margin-top:15px; cursor:pointer">Cancelar</button>
        </div>
    </div>

    <div id="qr-full-modal" onclick="this.style.display='none'">
        <img id="qr-big" src="">
    </div>

    <script>
        // LA CLAVE: Usamos 'cinepass_final' para que no se pierdan los datos nunca más
        let tickets = JSON.parse(localStorage.getItem('cinepass_final')) || [];
        let currentTicketId = null;

        function render() {
            const container = document.getElementById('ticket-container');
            container.innerHTML = '';
            document.getElementById('empty-state').style.display = tickets.length ? 'none' : 'block';
            tickets.forEach(t => {
                const card = document.createElement('div');
                card.className = 'home-card';
                card.onclick = () => openDetail(t.id);
                card.innerHTML = `<img src="${t.poster || ''}"><div class="label">${t.name}</div>`;
                container.appendChild(card);
            });
        }

        function openWizard() {
            currentTicketId = null;
            document.getElementById('wiz-title').innerText = "Nueva Entrada";
            document.querySelectorAll('input').forEach(i => i.value = '');
            document.getElementById('p-label').innerText = "Subir Póster";
            document.getElementById('q-label').innerText = "Subir Código QR";
            nextStep(1);
            document.getElementById('wizard-modal').style.display = 'flex';
        }

        function closeWizard() { document.getElementById('wizard-modal').style.display = 'none'; }
        function nextStep(s) {
            document.querySelectorAll('.step-container').forEach(el => el.classList.remove('active'));
            document.getElementById('step-' + s).classList.add('active');
        }
        function labelFile(input, id) { if(input.files[0]) document.getElementById(id).innerText = "Seleccionado"; }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = e => reject(e);
        });

        async function saveTicket() {
            const name = document.getElementById('m-name').value;
            if(!name) return alert("Ingresa el nombre de la película");

            const btn = document.getElementById('final-btn');
            btn.innerText = "Procesando..."; btn.disabled = true;

            const imgF = document.getElementById('m-img').files[0];
            const qrF = document.getElementById('m-qr').files[0];
            
            let posterBase64 = currentTicketId ? tickets.find(t => t.id === currentTicketId).poster : null;
            let qrBase64 = currentTicketId ? tickets.find(t => t.id === currentTicketId).qr : null;

            if(imgF) posterBase64 = await toBase64(imgF);
            if(qrF) qrBase64 = await toBase64(qrF);

            const newTicket = {
                id: currentTicketId || Date.now(),
                name,
                cine: document.getElementById('m-cine').value || 'Cine Local',
                count: document.getElementById('m-count').value || '1',
                hall: document.getElementById('m-hall').value || '-',
                seats: document.getElementById('m-seats').value || '-',
                poster: posterBase64,
                qr: qrBase64
            };

            if(currentTicketId) {
                tickets = tickets.map(t => t.id === currentTicketId ? newTicket : t);
            } else {
                tickets.push(newTicket);
            }

            localStorage.setItem('cinepass_final', JSON.stringify(tickets));
            btn.innerText = "Finalizar"; btn.disabled = false;
            
            closeWizard();
            closeDetail();
            render();
        }

        function openDetail(id) {
            const t = tickets.find(x => x.id === id);
            currentTicketId = id;
            document.getElementById('det-title').innerText = t.name;
            document.getElementById('det-img').src = t.poster || '';
            document.getElementById('det-cine').innerText = t.cine;
            document.getElementById('det-hall').innerText = t.hall;
            document.getElementById('det-count').innerText = t.count;
            document.getElementById('det-seats').innerText = t.seats;
            document.getElementById('det-qr').src = t.qr || '';
            
            const detailView = document.getElementById('detail-view');
            detailView.style.display = 'flex';
            // Pequeño timeout para que el navegador registre el cambio de display y anime el resto
            setTimeout(() => detailView.classList.add('active'), 10);
            document.body.style.overflow = 'hidden';
        }

        function closeDetail() {
            const detailView = document.getElementById('detail-view');
            detailView.classList.remove('active');
            setTimeout(() => {
                detailView.style.display = 'none';
                document.body.style.overflow = 'auto';
            }, 300);
        }

        function editTicket() {
            const t = tickets.find(x => x.id === currentTicketId);
            document.getElementById('m-name').value = t.name;
            document.getElementById('m-cine').value = t.cine;
            document.getElementById('m-count').value = t.count;
            document.getElementById('m-hall').value = t.hall;
            document.getElementById('m-seats').value = t.seats;
            document.getElementById('wiz-title').innerText = "Editar Entrada";
            nextStep(1);
            document.getElementById('wizard-modal').style.display = 'flex';
        }

        function handleDelete() {
            if(confirm("¿Eliminar entrada?")) {
                tickets = tickets.filter(t => t.id !== currentTicketId);
                localStorage.setItem('cinepass_final', JSON.stringify(tickets));
                render();
                closeDetail();
            }
        }

        function openFullQR() {
            document.getElementById('qr-big').src = document.getElementById('det-qr').src;
            document.getElementById('qr-full-modal').style.display = 'flex';
        }

        render();
    </script>
</body>
</html>
