<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0b0b0d">
    <title>CinePass PWA</title>
    <link rel="manifest" href="data:application/manifest+json,{'name':'CinePass','short_name':'CinePass','start_url':'.','display':'standalone','background_color':'#0b0b0d','theme_color':'#0b0b0d' }">
    
    <style>
        :root {
            --bg: #0b0b0d;
            --card-bg: #1c1c1e;
            --accent: #ff3b30;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --radius: 20px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, system-ui, sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            max-width: 500px;
            padding: 40px 20px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.8rem; margin: 0; font-weight: 800; }

        #add-btn {
            background: white; border: none; width: 45px; height: 45px;
            border-radius: 50%; font-size: 24px; font-weight: bold; cursor: pointer;
        }

        #ticket-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            perspective: 1200px;
        }

        .ticket-wrapper {
            position: relative;
            width: 100%;
            min-height: 200px; 
            aspect-ratio: 16 / 9;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ticket-wrapper.is-flipped { transform: rotateY(180deg); }

        .ticket-front, .ticket-back {
            position: absolute;
            inset: 0; 
            backface-visibility: hidden;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background: var(--card-bg); 
        }

        .ticket-front img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .overlay-text {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            font-weight: 700; font-size: 1.2rem; z-index: 2;
        }

        .ticket-back {
            background: #ffffff;
            color: #000;
            transform: rotateY(180deg);
            display: flex;
            padding: 20px;
            align-items: center;
            gap: 15px;
        }

        .qr-img { 
            width: 100px; height: 100px; object-fit: contain; 
            cursor: pointer; /* Indica que se puede tocar */
            border: 2px solid transparent;
            transition: transform 0.2s;
        }
        .qr-img:active { transform: scale(0.95); } /* Pequeña animación al tocar */

        .info-grid { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .info-grid span { font-size: 0.65rem; text-transform: uppercase; color: var(--accent); font-weight: 800; }
        .info-grid h3 { margin: 0; font-size: 1rem; line-height: 1.2; }
        .info-grid p { margin: 0; font-size: 0.8rem; color: #444; }

        .delete-btn {
            position: absolute; top: -10px; right: -10px;
            background: var(--accent); border: 2px solid var(--bg);
            color: white; border-radius: 50%; width: 28px; height: 28px;
            z-index: 20; cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }

        /* --- Modales --- */
        #modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: none; align-items: flex-end; z-index: 100;
        }

        .modal-content {
            background: var(--card-bg); width: 100%; max-width: 500px;
            margin: 0 auto; border-radius: 25px 25px 0 0;
            padding: 25px; max-height: 85vh; overflow-y: auto;
        }

        /* --- Modal Código QR Pantalla Completa --- */
        #qr-fullscreen-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(15px);
            display: none; align-items: center; justify-content: center; z-index: 200;
        }

        .qr-fullscreen-content {
            background: white; padding: 30px; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            box-shadow: 0 0 50px rgba(255,255,255,0.2);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        #qr-large-img { width: 75vw; max-width: 350px; aspect-ratio: 1; object-fit: contain; }
        
        .qr-fullscreen-content p { color: black; font-weight: bold; margin-top: 15px; font-size: 0.9rem; text-transform: uppercase;}

        .close-fullscreen {
            position: absolute; top: -50px; right: 0;
            color: white; font-size: 30px; background: none; border: none; cursor: pointer;
        }

        input {
            width: 100%; background: #2c2c2e; border: none;
            padding: 15px; border-radius: 12px; color: white;
            margin-bottom: 12px; font-size: 1rem;
        }

        .btn-save {
            width: 100%; padding: 18px; background: white;
            color: black; border: none; border-radius: 15px;
            font-weight: bold; font-size: 1rem; margin-top: 10px;
        }

        .hidden { display: none !important; }
        #empty-state { margin-top: 100px; text-align: center; color: var(--text-dim); }
    </style>
</head>
<body>

    <header>
        <h1>Mis Entradas</h1>
        <button id="add-btn" onclick="openModal()">+</button>
    </header>

    <main id="app" style="width: 100%;">
        <div id="empty-state">
            <p style="font-size: 40px; margin-bottom: 10px;">🎟️</p>
            <p>No hay entradas guardadas</p>
        </div>
        <div id="ticket-container"></div>
    </main>

    <div id="modal">
        <div class="modal-content">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2 style="margin:0">Nueva Entrada</h2>
                <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:24px;">✕</button>
            </div>
            
            <input type="text" id="m-name" placeholder="Película">
            <input type="text" id="m-cine" placeholder="Cine">
            
            <div style="display:flex; gap:10px;">
                <input type="number" id="m-count" placeholder="Cant. Personas">
                <input type="number" id="m-hall" placeholder="Sala">
            </div>
            <input type="text" id="m-seats" placeholder="Butacas (Ej: A1, A2)">

            <label style="color:var(--text-dim); font-size:0.8rem; margin:10px 0 5px; display:block;">Imagen de Fondo</label>
            <input type="file" id="m-img" accept="image/*">
            
            <label style="color:var(--text-dim); font-size:0.8rem; margin:10px 0 5px; display:block;">Código QR</label>
            <input type="file" id="m-qr" accept="image/*">
            
            <button class="btn-save" onclick="processTicket()">Guardar Entrada</button>
        </div>
    </div>

    <div id="qr-fullscreen-modal" onclick="closeFullscreenQR()">
        <div class="qr-fullscreen-content" onclick="event.stopPropagation()">
            <button class="close-fullscreen" onclick="closeFullscreenQR()">✕</button>
            <img id="qr-large-img" src="" alt="QR">
            <p>Escanear en el lector</p>
        </div>
    </div>

    <script>
        let tickets = JSON.parse(localStorage.getItem('cinema_tickets_v2')) || [];

        function openModal() { document.getElementById('modal').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        // --- LÓGICA DEL QR AMPLIADO ---
        function openFullscreenQR(id, e) {
            e.stopPropagation(); // IMPORTANTE: Evita que la tarjeta gire al tocar el QR
            const ticket = tickets.find(t => t.id === id);
            if (ticket) {
                document.getElementById('qr-large-img').src = ticket.qr || 'https://api.qrserver.com/v1/create-qr-code/?data=error';
                document.getElementById('qr-fullscreen-modal').style.display = 'flex';
            }
        }

        function closeFullscreenQR() {
            document.getElementById('qr-fullscreen-modal').style.display = 'none';
        }

        const toBase64 = file => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
        });

        async function processTicket() {
            const name = document.getElementById('m-name').value;
            if (!name) return alert("El nombre es obligatorio");

            const imgFile = document.getElementById('m-img').files[0];
            const qrFile = document.getElementById('m-qr').files[0];

            const newTicket = {
                id: Date.now(),
                name,
                cine: document.getElementById('m-cine').value || 'Cine Local',
                count: document.getElementById('m-count').value || '1',
                hall: document.getElementById('m-hall').value || '-',
                seats: document.getElementById('m-seats').value || '-',
                poster: imgFile ? await toBase64(imgFile) : null,
                qr: qrFile ? await toBase64(qrFile) : null
            };

            tickets.push(newTicket);
            localStorage.setItem('cinema_tickets_v2', JSON.stringify(tickets));
            renderTickets();
            closeModal();
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        function deleteTicket(id, e) {
            e.stopPropagation();
            tickets = tickets.filter(t => t.id !== id);
            localStorage.setItem('cinema_tickets_v2', JSON.stringify(tickets));
            renderTickets();
        }

        function renderTickets() {
            const container = document.getElementById('ticket-container');
            const empty = document.getElementById('empty-state');
            container.innerHTML = '';

            if (tickets.length === 0) {
                empty.classList.remove('hidden');
            } else {
                empty.classList.add('hidden');
                tickets.forEach(t => {
                    const wrap = document.createElement('div');
                    wrap.className = 'ticket-wrapper';
                    wrap.onclick = () => wrap.classList.toggle('is-flipped');

                    wrap.innerHTML = `
                        <button class="delete-btn" onclick="deleteTicket(${t.id}, event)">✕</button>
                        <div class="ticket-front">
                            ${t.poster ? `<img src="${t.poster}">` : `<div style="width:100%;height:100%;background:linear-gradient(45deg, #222, #444)"></div>`}
                            <div class="overlay-text">${t.name}</div>
                        </div>
                        <div class="ticket-back">
                            <img src="${t.qr || 'https://api.qrserver.com/v1/create-qr-code/?data=error'}" class="qr-img" onclick="openFullscreenQR(${t.id}, event)" title="Toca para ampliar">
                            <div class="info-grid">
                                <span>Entrada Digital</span>
                                <h3>${t.name}</h3>
                                <p>📍 ${t.cine}</p>
                                <p>Sala ${t.hall} • ${t.count} Pers.</p>
                                <p style="margin-top:5px; font-weight:bold; color:black;">${t.seats}</p>
                            </div>
                        </div>
                    `;
                    container.appendChild(wrap);
                });
            }
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('data:text/javascript;base64,' + btoa('self.addEventListener("fetch", (e) => {});'));
            });
        }

        renderTickets();
    </script>
</body>
</html>
